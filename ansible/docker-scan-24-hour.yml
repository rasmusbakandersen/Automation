---
- name: Docker Error Log Scan (Last 24 Hours)
  hosts: docker-hosts
  gather_facts: false
  vars:
    log_since: "24h"
    error_patterns: "error|fatal|panic|critical|exception|traceback|fail|denied|refused|timeout|killed|oom|segfault|crash"
    exclude_patterns: "error_reporting|error_log|on_error|error_page|error_handler|errorlevel|errno|_errors|loglevel|error\\.css|error\\.js|Failed=0|flag evaluation succeeded|Server stats"
  tasks:
    - name: Get running container IDs and names
      ansible.builtin.shell: docker ps --format '{{ '{{' }}.ID{{ '}}' }} {{ '{{' }}.Names{{ '}}' }} {{ '{{' }}.Image{{ '}}' }}'
      register: containers
      changed_when: false

    - name: Scan each container for errors
      ansible.builtin.shell: |
        ERRORS=$(docker logs --since {{ log_since }} {{ item.split()[0] }} 2>&1 \
          | grep -iE '{{ error_patterns }}' \
          | grep -ivE '{{ exclude_patterns }}' \
          | tail -30)
        if [ -n "$ERRORS" ]; then
          echo "$ERRORS"
        fi
      register: log_results
      loop: "{{ containers.stdout_lines }}"
      changed_when: false
      failed_when: false

    - name: Set containers with errors
      ansible.builtin.set_fact:
        error_containers: "{{ log_results.results | selectattr('stdout', 'ne', '') | list }}"

    - name: Display summary
      ansible.builtin.debug:
        msg: "{{ error_containers | length }} of {{ containers.stdout_lines | length }} containers have errors."

    - name: Display errors only
      ansible.builtin.debug:
        msg: |
          === {{ item.item.split()[1] }} ({{ item.item.split()[2] }}) ===
          {{ item.stdout }}
      loop: "{{ error_containers }}"
      loop_control:
        label: "{{ item.item.split()[1] }}"
      when: error_containers | length > 0

    - name: All clear
      ansible.builtin.debug:
        msg: "All {{ containers.stdout_lines | length }} containers are healthy. No errors found."
      when: error_containers | length == 0
